; ── Online Subsystem: Steam only (P7 §3-1, user-confirmed — no Null/LAN fallback) ────────────────────────
; Steam-backed sessions + friend invites for the lobby. Dev app id 480 (Spacewar, shared test app) — replace
; with a dedicated app id at ship. Test = Steam client running, packaged 2-PC build.
[OnlineSubsystem]
DefaultPlatformService=Steam

[OnlineSubsystemSteam]
bEnabled=true
SteamDevAppId=480
; Let listen servers also init the Steam client interfaces so the host can drive the friend overlay/invites.
bInitServerOnClient=true
; ── Steam Cloud (메타 세이브) — 문서화 스텁 ────────────────────────────────────────────────────────────────
; 메타 세이브(UFPSRSaveGameSubsystem)는 `<Project>/Saved/SaveGames/<Slot>.sav`에 기록된다(슬롯명=DefaultGame.ini
; [FPSRSaveSettings] PrimarySlotName/BackupSlotName → 기본 PlayerMeta.sav / PlayerMeta_Backup.sav). Steam Auto-Cloud
; 파일 글롭(예: Root=WinMyDocuments 또는 게임 설치폴더, Path=Saved/SaveGames, Pattern=*.sav)은 UE .ini가 아니라
; **Steamworks 파트너 사이트(App Admin > Cloud)** 에서 설정한다. 현재 SteamDevAppId=480(Spacewar 공용 테스트 앱)이라
; 실 클라우드 구성 불가 → 출시용 전용 AppId 발급 시 파트너 사이트에서 위 패턴을 화이트리스트 등록할 것. 슬롯 파일명의
; 단일 출처는 [FPSRSaveSettings]이므로 파트너 사이트 글롭도 그 값과 일치시킨다.

; Route the game net driver through SteamSockets (ISteamNetworkingSockets: NAT punchthrough + Valve SDR relay,
; auto-inited via InitRelayNetworkAccess). UE5.7 NOTE: USteamNetDriver + the "STEAM" socket subsystem moved OUT of
; OnlineSubsystemSteam into separate plugins (legacy SocketSubsystemSteamIP / modern SteamSockets) with NO
; CoreRedirect — so the old "OnlineSubsystemSteam.SteamNetDriver" string silently fails to load and the engine
; falls back to IpNetDriver (host binds raw UDP, client dials "steam.<id>" as a DNS name → instant
; PendingConnectionFailure). Fix = enable the SteamSockets plugin (.uproject) + the fully-qualified class below.
; CLEAR the inherited array first (BaseEngine defines GameNetDriver=IpNetDriver). IpNetDriver fallback kept for LAN.
; SteamSockets registers only in a packaged game (not editor/PIE), so verify multiplayer in the PACKAGED build.
[/Script/Engine.GameEngine]
!NetDriverDefinitions=ClearArray
+NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="/Script/SteamSockets.SteamSocketsNetDriver",DriverClassNameFallback="/Script/OnlineSubsystemUtils.IpNetDriver")
+NetDriverDefinitions=(DefName="BeaconNetDriver",DriverClassName="OnlineSubsystemUtils.IpNetDriver",DriverClassNameFallback="OnlineSubsystemUtils.IpNetDriver")
+NetDriverDefinitions=(DefName="DemoNetDriver",DriverClassName="/Script/Engine.DemoNetDriver",DriverClassNameFallback="/Script/Engine.DemoNetDriver")

