; ── Online Subsystem: Steam only (P7 §3-1, user-confirmed — no Null/LAN fallback) ────────────────────────
; Steam-backed sessions + friend invites for the lobby. Dev app id 480 (Spacewar, shared test app) — replace
; with a dedicated app id at ship. Test = Steam client running, packaged 2-PC build.
[OnlineSubsystem]
DefaultPlatformService=Steam

[OnlineSubsystemSteam]
bEnabled=true
SteamDevAppId=480
; Let listen servers also init the Steam client interfaces so the host can drive the friend overlay/invites.
bInitServerOnClient=true

; Route the game net driver through Steam sockets. CLEAR the inherited array first — BaseEngine.ini already
; defines GameNetDriver=IpNetDriver, and a plain "+NetDriverDefinitions" would leave that entry earlier in the
; array so UE resolves GameNetDriver to IpNetDriver (the Steam socket path would never be used). Re-add Game
; (Steam, with IpNetDriver fallback) + Beacon + Demo so the non-game drivers are preserved.
[/Script/Engine.GameEngine]
!NetDriverDefinitions=ClearArray
+NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="OnlineSubsystemSteam.SteamNetDriver",DriverClassNameFallback="OnlineSubsystemUtils.IpNetDriver")
+NetDriverDefinitions=(DefName="BeaconNetDriver",DriverClassName="OnlineSubsystemUtils.IpNetDriver",DriverClassNameFallback="OnlineSubsystemUtils.IpNetDriver")
+NetDriverDefinitions=(DefName="DemoNetDriver",DriverClassName="/Script/Engine.DemoNetDriver",DriverClassNameFallback="/Script/Engine.DemoNetDriver")

