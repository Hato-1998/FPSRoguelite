; ── Packaging (P7 §packaging) ───────────────────────────────────────────────────────────────────────────
; The flow travels between maps by NAME (ServerTravel "L_Lobby?listen", config RunMap/LobbyMap, seamless
; TransitionMap), which the cooker can't trace as hard references — so list them explicitly or a packaged build
; boots to the menu then crashes on travel. Gameplay DataAssets (loadout pool, run schedule, cards, missions,
; weapons, boss def) are loaded via config soft paths / AssetManager, also untraceable — always-cook their (small)
; directories. The large /Game/Assets art library is intentionally NOT bulk-cooked: its runtime parts (VAT meshes,
; materials, bone textures) come in as hard dependencies of the enemy/boss/player BPs.
[/Script/UnrealEd.ProjectPackagingSettings]
